# Ordering — Deployment + Service + HPA. Appelle Catalog DIRECTEMENT (pas via le gateway).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels: { app: ordering }
  template:
    metadata:
      labels: { app: ordering }
    spec:
      containers:
        - name: ordering
          image: ecommerce-ordering:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            # Service discovery Aspire hors AppHost : Ordering → Catalog
            - name: services__catalog__http__0
              value: http://catalog:8080
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /alive, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: ordering
  namespace: ecommerce
spec:
  selector: { app: ordering }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ordering
  namespace: ecommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ordering
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
